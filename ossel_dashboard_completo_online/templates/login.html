<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login - OSSEL Dashboard</title><style>
body{font-family:Inter,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#061a35,#0b3266 60%,#1463c2);color:#0f172a}.box{width:min(420px,92vw);background:#fff;border-radius:28px;padding:30px;box-shadow:0 30px 80px rgba(0,0,0,.25)}h1{margin:0 0 8px;color:#061a35}p{color:#64748b;line-height:1.5}input{width:100%;box-sizing:border-box;border:1px solid #e2e8f0;border-radius:16px;padding:14px;font-size:1rem;margin:14px 0}button{width:100%;border:0;border-radius:16px;padding:14px;background:#1463c2;color:#fff;font-weight:800;font-size:1rem;cursor:pointer}.err{color:#991b1b;background:#fee2e2;border-radius:12px;padding:10px;margin-top:10px}.logo{font-weight:900;color:#1463c2;letter-spacing:.04em;text-transform:uppercase;font-size:.78rem}</style></head><body><form class="box" method="post"><div class="logo">OSSEL Centro Tecnológico</div><h1>Acesso ao dashboard</h1><p>Digite o PIN operacional para acessar o painel.</p><input name="pin" type="password" placeholder="PIN" autofocus><button>Entrar</button>{% if erro %}<div class="err">{{ erro }}</div>{% endif %}<p style="font-size:.84rem">PIN padrão inicial: <b>ossel2026</b>. Altere pela variável <b>APP_PIN</b> na hospedagem.</p></form></body></html>
